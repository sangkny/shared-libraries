# shared-libraries — GitHub Actions CI (LM Studio 불필요 경량 스위트)
name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Pytest
        run: |
          pytest ontology/tests \
            tests/test_provider_cloud_env.py \
            tests/test_harness.py::TestHarnessSmoke::test_smoke_scenarios_exist \
            tests/test_events.py \
            -q
