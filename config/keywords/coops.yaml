# shared-libraries/config/keywords/coops.yaml
#
# CoOps-Platform (회사 운영 자동화) 도메인 우선순위 키워드 (Step 7).
#
# 핵심 흐름: 계약 → 결재 → 콘텐츠 생성 → 투자자 보고 (book §15 CoOps 설계).

domain: business
description: |
  CoOps 의 turn 우선순위 키워드. 계약·결재·콘텐츠·IR 흐름을 모두 포괄한다.
  contract_analyzer / approval / video_gen / post_gen / report_gen 4개
  서브플로우가 같은 키워드 집합을 공유 — 단일 OntologyValidator 와 정합.

keywords:
  # 계약 & 결재 (Day 4 BUSINESS Ontology 와 정합)
  - 계약
  - 갱신
  - 해지
  - 위반
  - 손해배상
  - 결재
  - 승인
  - 반려
  - approver
  - "CON-"      # 계약 번호 prefix (CON-YYYYMMDD)

  # 금액 / 통화 / 회계
  - 금액
  - 통화
  - 매출
  - 비용
  - 수익
  - 손익
  - 마진

  # 마케팅 / 콘텐츠
  - 홍보
  - 캠페인
  - SNS
  - 포스트
  - 비디오
  - 광고

  # 투자자 관계 (IR)
  - 투자자
  - 라운드
  - valuation
  - KPI
  - 펀딩
  - IR
